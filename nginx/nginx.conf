events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server frontend:3000;
    }

    # Disable buffering globally — required for Claude API streaming responses
    proxy_buffering    off;
    proxy_cache        off;

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name politicalintelligence.com www.politicalintelligence.com;
        return 301 https://politicalintelligence.com$request_uri;
    }

    server {
        listen 443 ssl;
        server_name politicalintelligence.com www.politicalintelligence.com;

        ssl_certificate     /etc/letsencrypt/live/politicalintelligence.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/politicalintelligence.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 10M;

        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 300s;
        }
    }
}
